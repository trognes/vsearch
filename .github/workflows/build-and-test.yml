name: Build and test

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ghostscript groff libbz2-dev zlib1g-dev

    - name: Configure and build
      run: |
        ./autogen.sh
        ./configure CFLAGS="-O2" CXXFLAGS="-O2"
        make clean
        make ARFLAGS="cr" -j$(nproc)
        bin/vsearch -v

    - name: Run tests
      run: |
        export PATH=$PWD/bin:$PATH
        git clone --depth 1 --branch ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }} https://github.com/frederic-mahe/vsearch-tests
        cd vsearch-tests
        bash ./run_all_tests.sh


  cross-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: windows-x86_64, host: x86_64-w64-mingw32,    pkgs: "mingw-w64 libz-mingw-w64-dev" }
          - { name: linux-aarch64,  host: aarch64-linux-gnu,      pkgs: "g++-aarch64-linux-gnu libsimde-dev" }
          - { name: linux-mips64el, host: mips64el-linux-gnuabi64, pkgs: "g++-mips64el-linux-gnuabi64 libsimde-dev" }
          - { name: linux-ppc64le,  host: powerpc64le-linux-gnu,  pkgs: "g++-powerpc64le-linux-gnu libsimde-dev" }
          - { name: linux-riscv64,  host: riscv64-linux-gnu,      pkgs: "g++-riscv64-linux-gnu libsimde-dev" }

    name: cross-build (${{ matrix.target.name }})

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ghostscript groff libbz2-dev zlib1g-dev ${{ matrix.target.pkgs }}

    - name: Build for ${{ matrix.target.name }}
      run: |
        ./autogen.sh
        ./configure CFLAGS="-O2" CXXFLAGS="-O2" --host=${{ matrix.target.host }}
        make clean
        make ARFLAGS="cr" -j$(nproc)


  macos-arm64:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        # aws/tap and azure/bicep are pre-tapped on the GitHub macOS runner
        # images and trigger Homebrew tap-trust warnings; we use nothing from
        # them, so remove them before updating/installing. azure/bicep ships an
        # installed formula (bicep): uninstall it first so the tap untaps
        # cleanly without --force (which would itself print a warning). Each
        # step is guarded so it stays quiet and non-fatal on a future image
        # that no longer has these taps/formulae. We do NOT silence stderr of
        # the actual operations: hiding it is what masked the earlier failure.
        brew list bicep >/dev/null 2>&1 && brew uninstall bicep
        for tap in aws/tap azure/bicep; do
          brew tap | grep -qx "$tap" && brew untap "$tap"
        done
        brew update
        brew install autoconf automake ghostscript groff

    - name: Configure and build
      run: |
        ./autogen.sh
        ./configure CFLAGS="-O2" CXXFLAGS="-O2"
        make clean
        make ARFLAGS="cr" -j$(sysctl -n hw.ncpu)
        bin/vsearch -v

    - name: Run tests
      run: |
        export PATH=$PWD/bin:$PATH
        git clone --depth 1 --branch ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }} https://github.com/frederic-mahe/vsearch-tests
        cd vsearch-tests
        bash ./run_all_tests.sh


  macos-x86_64:
    runs-on: macos-15-intel
    timeout-minutes: 20

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        # aws/tap and azure/bicep are pre-tapped on the GitHub macOS runner
        # images and trigger Homebrew tap-trust warnings; we use nothing from
        # them, so remove them before updating/installing. azure/bicep ships an
        # installed formula (bicep): uninstall it first so the tap untaps
        # cleanly without --force (which would itself print a warning). Each
        # step is guarded so it stays quiet and non-fatal on a future image
        # that no longer has these taps/formulae. We do NOT silence stderr of
        # the actual operations: hiding it is what masked the earlier failure.
        brew list bicep >/dev/null 2>&1 && brew uninstall bicep
        for tap in aws/tap azure/bicep; do
          brew tap | grep -qx "$tap" && brew untap "$tap"
        done
        brew update
        brew install autoconf automake ghostscript groff

    - name: Configure and build
      run: |
        ./autogen.sh
        ./configure CFLAGS="-O2" CXXFLAGS="-O2"
        make clean
        make ARFLAGS="cr" -j$(sysctl -n hw.ncpu)
        bin/vsearch -v

    - name: Run tests
      run: |
        export PATH=$PWD/bin:$PATH
        git clone --depth 1 --branch ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }} https://github.com/frederic-mahe/vsearch-tests
        cd vsearch-tests
        bash ./run_all_tests.sh


  freebsd-x86_64:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # The FreeBSD VM (vmactions / nested QEMU) intermittently hangs during the
    # test run — roughly half the time the suite stalls after "Running tests..."
    # and the job is cancelled at the 20-minute limit. Until that is understood
    # and fixed, keep this job from gating PRs: it still runs and reports, but a
    # hang/failure here no longer fails the workflow. See the diagnostics added
    # to the run step below (per-suite timeout + heartbeat + uploaded log).
    continue-on-error: true

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    # Clone the test suite on the Ubuntu host, where the network is reliable,
    # rather than inside the FreeBSD VM. An in-VM `git clone` intermittently
    # stalls on the guest's network and, with no git timeout, hangs until the
    # 20-minute job limit. vmactions syncs the workspace into the VM, so the
    # cloned directory is available there.
    - name: Clone the test suite (on the host, not the FreeBSD VM)
      run: |
        git clone --depth 1 --branch ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }} https://github.com/frederic-mahe/vsearch-tests

    - name: Build and test on FreeBSD
      uses: vmactions/freebsd-vm@v1
      with:
        usesh: true
        prepare: |
          pkg update -f
          pkg install -y autoconf automake gmake bash git bzip2 ghostscript10 groff
          pw useradd -n runner -m -s /usr/local/bin/bash
        run: |
          echo "========== Building vsearch =========="
          ./autogen.sh
          ./configure CFLAGS="-O2" CXXFLAGS="-O2"
          gmake clean
          gmake ARFLAGS="cr" -j$(sysctl -n hw.ncpu)
          bin/vsearch -v
          echo "========== Build complete =========="

          # vsearch-tests was cloned on the host (previous step); vmactions
          # syncs the workspace into the VM, so it should be present here.
          # Fail fast with a clear message (not a hang) if the sync did not
          # bring it in.
          echo "========== Checking for the test suite in the VM =========="
          if [ ! -d vsearch-tests/scripts ]; then
            echo "ERROR: vsearch-tests was not synced into the VM. Workspace contents:"
            ls -la
            exit 1
          fi
          echo "Found vsearch-tests ($(ls vsearch-tests/scripts | wc -l) test scripts)."
          chown -R runner vsearch-tests

          # The suite runs ~7,700 tests, each printing a result line.
          # Streaming that volume over the vmactions SSH channel wedges
          # the FreeBSD guest after a few minutes (it stops responding at
          # a random point). Run the suite into a log file inside the VM
          # instead, then surface a bounded summary so CI still reports
          # failures. root bypasses POSIX permission checks, so the "file
          # not readable/writable" tests need an unprivileged user.
          #
          # Diagnostics for the intermittent FreeBSD hang: the suite runs in
          # the background under its own timeout (so a hung test cannot eat the
          # whole 20-minute job budget and skip the summary below). A watcher
          # polls the log once a second but prints only when the last non-blank
          # line changes — near-real-time progress without flooding the vmactions
          # SSH channel (high output volume wedges the guest, which is why the
          # suite output is redirected to a file in the first place). On the
          # first ~30 s with no new output the watcher dumps the test process
          # tree with each process's state and wait channel (wchan) — showing
          # what the suite is blocked on (a pipe read, a child wait, disk I/O,
          # ...) and the exact command — then stops waiting: more silence adds
          # nothing. It does NOT kill the wedged processes — killing the runner's
          # processes also tore down the vmactions SSH session (ssh exited 143),
          # ending the step abnormally and skipping copyback. Instead it abandons
          # them to the VM teardown and lets the script finish cleanly, so the
          # summary runs and vmactions copies test.log back for the artifact. The
          # background suite is detached from the SSH stdio (</dev/null >/dev/null
          # 2>&1) so the session closes promptly on exit instead of waiting on a
          # backgrounded process that still holds the channel. The per-suite
          # timeout remains a backstop.
          echo "========== Running tests... =========="
          suite_timeout=720
          rm -f vsearch-tests/test.log
          su -m runner -c "cd vsearch-tests && PATH=$PWD/bin:\$PATH timeout -k 30 ${suite_timeout} bash ./run_all_tests.sh > test.log 2>&1" </dev/null >/dev/null 2>&1 &
          suite_pid=$!
          last_sig=""
          stall=0
          hung=0
          while kill -0 "$suite_pid" 2>/dev/null; do
            sig=$(tail -n 20 vsearch-tests/test.log 2>/dev/null | grep -v '^[[:space:]]*$' | tail -n 1)
            if [ "$sig" != "$last_sig" ]; then
              echo "[$(date -u +%H:%M:%S)] $sig"
              last_sig="$sig"
              stall=0
            else
              stall=$((stall + 1))
              if [ "$stall" -ge 30 ]; then
                echo "[$(date -u +%H:%M:%S)] no new test output for ${stall}s; test process tree (pid ppid stat wchan command):"
                ps -U runner -o pid,ppid,stat,wchan,command 2>/dev/null | head -n 25 | sed 's/^/    /'
                echo "    --- su/wrapper ---"
                ps -axww -o pid,ppid,stat,wchan,command 2>/dev/null | grep -E 'run_all_tests|[t]imeout -k' | sed 's/^/    /'
                echo "[$(date -u +%H:%M:%S)] suite stalled — abandoning the wedged suite and finishing so the summary and test.log are captured."
                hung=1
                break
              fi
            fi
            sleep 1
          done
          if [ "$hung" -eq 1 ]; then
            status=124
          else
            wait "$suite_pid" 2>/dev/null
            status=$?
          fi
          echo "========== Tests finished (exit status $status) =========="
          if [ "$status" -eq 124 ] || [ "$status" -eq 137 ]; then
            echo "!!! Test suite stalled or timed out and was terminated — the hang is"
            echo "!!! in or just after the last test shown below. (status $status)"
          fi
          echo "===== FAIL lines ====="
          grep -E 'FAIL' vsearch-tests/test.log || echo "(none)"
          echo "===== last 80 lines of test.log ====="
          tail -n 80 vsearch-tests/test.log
          # Record the status and exit 0 so vmactions runs its copyback: it
          # SKIPS copyback when the run script exits non-zero, which is why the
          # test.log artifact kept coming up empty. The host-side "Report" step
          # below reads test.status and turns it back into the job's pass/fail.
          echo "$status" > vsearch-tests/test.status
          exit 0

    # vmactions copies the workspace back to the host, so the full in-VM test
    # log (all ~7,700 result lines, not just the tail above) is available here.
    # Upload it for offline inspection of which test hung. Runs even when the
    # suite times out or fails.
    - name: Upload FreeBSD test log
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: freebsd-test-log
        path: vsearch-tests/test.log
        if-no-files-found: warn

    # The VM script exits 0 so vmactions copies test.log / test.status back to
    # the host; the real suite status is recorded in test.status. Re-assert it
    # here so the job's pass/fail reflects the actual result. The job is
    # continue-on-error, so this stays non-gating but goes visibly red on a real
    # failure or hang. Missing test.status (copyback failed) defaults to failure.
    - name: Report FreeBSD test result
      if: always()
      run: |
        status=$(cat vsearch-tests/test.status 2>/dev/null || echo 1)
        echo "FreeBSD test suite exit status: ${status}"
        exit "${status}"
