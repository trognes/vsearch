name: Build and test

on:
  # Skip documentation-only changes (paths-ignore). All jobs run on push and
  # pull_request EXCEPT macos-x86_64, which runs only on the weekly schedule /
  # manual dispatch (see its job-level if:) to save the 10x-billed macOS minutes.
  push:
    branches: [ "master", "dev" ]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [ "master", "dev" ]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
  schedule:
    - cron: "19 4 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event_name != 'schedule' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ghostscript groff libbz2-dev zlib1g-dev

    - name: Configure and build
      run: |
        ./autogen.sh
        ./configure CFLAGS="-O2" CXXFLAGS="-O2"
        make clean
        make ARFLAGS="cr" -j$(nproc)
        bin/vsearch -v

    - name: Run tests
      run: |
        export PATH=$PWD/bin:$PATH
        git clone --depth 1 --branch ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }} https://github.com/frederic-mahe/vsearch-tests
        cd vsearch-tests
        bash ./run_all_tests.sh


  # Native ARM64 Linux runner (free for public repos). Unlike the cross-build
  # matrix, which only compiles, this builds AND runs the full test suite on real
  # aarch64 hardware, exercising the native Neon SIMD path (not the SIMDe
  # fallback). Reliable enough to run per push/PR and gate.
  linux-aarch64-native:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    if: ${{ github.event_name != 'schedule' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ghostscript groff libbz2-dev zlib1g-dev

    - name: Configure and build
      run: |
        ./autogen.sh
        ./configure CFLAGS="-O2" CXXFLAGS="-O2"
        make clean
        make ARFLAGS="cr" -j$(nproc)
        bin/vsearch -v

    - name: Run tests
      run: |
        export PATH=$PWD/bin:$PATH
        git clone --depth 1 --branch ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }} https://github.com/frederic-mahe/vsearch-tests
        cd vsearch-tests
        bash ./run_all_tests.sh


  cross-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event_name != 'schedule' }}

    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: windows-x86_64, host: x86_64-w64-mingw32,    pkgs: "mingw-w64 libz-mingw-w64-dev" }
          - { name: linux-aarch64,  host: aarch64-linux-gnu,      pkgs: "g++-aarch64-linux-gnu libsimde-dev" }
          - { name: linux-mips64el, host: mips64el-linux-gnuabi64, pkgs: "g++-mips64el-linux-gnuabi64 libsimde-dev" }
          - { name: linux-ppc64le,  host: powerpc64le-linux-gnu,  pkgs: "g++-powerpc64le-linux-gnu libsimde-dev" }
          - { name: linux-riscv64,  host: riscv64-linux-gnu,      pkgs: "g++-riscv64-linux-gnu libsimde-dev" }

    name: cross-build (${{ matrix.target.name }})

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ghostscript groff libbz2-dev zlib1g-dev ${{ matrix.target.pkgs }}

    - name: Build for ${{ matrix.target.name }}
      run: |
        ./autogen.sh
        ./configure CFLAGS="-O2" CXXFLAGS="-O2" --host=${{ matrix.target.host }}
        make clean
        make ARFLAGS="cr" -j$(nproc)


  # Actually RUN the cross-compiled little-endian targets under QEMU user-mode
  # emulation, to catch the runtime bugs a build-only matrix misses (SIMDe
  # miscompiles, ABI/calling-convention breaks). See CODE_REVIEW.md "Analysis
  # methods not yet applied", item 4. Non-gating while it proves out; emulation
  # is slow, so this is a candidate to move to the weekly schedule later.
  qemu-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event_name != 'schedule' }}
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: ppc64le,  host: powerpc64le-linux-gnu,    pkg: g++-powerpc64le-linux-gnu,   qemu: qemu-ppc64le-static,  prefix: /usr/powerpc64le-linux-gnu }
          - { name: mips64el, host: mips64el-linux-gnuabi64,   pkg: g++-mips64el-linux-gnuabi64, qemu: qemu-mips64el-static, prefix: /usr/mips64el-linux-gnuabi64 }
          - { name: riscv64,  host: riscv64-linux-gnu,         pkg: g++-riscv64-linux-gnu,       qemu: qemu-riscv64-static,  prefix: /usr/riscv64-linux-gnu }

    name: qemu-smoke (${{ matrix.target.name }})

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install cross toolchain and QEMU
      run: |
        sudo apt-get update
        sudo apt-get install -y ghostscript groff libbz2-dev zlib1g-dev \
          ${{ matrix.target.pkg }} libsimde-dev qemu-user-static

    - name: Cross-build for ${{ matrix.target.name }}
      run: |
        ./autogen.sh
        ./configure CFLAGS="-O2" CXXFLAGS="-O2" --host=${{ matrix.target.host }}
        make clean
        make ARFLAGS="cr" -j$(nproc)

    - name: Provide target zlib/bzip2 for runtime gz/bz2
      run: |
        # vsearch dlopens libz.so.1 / libbz2.so.1 at runtime; the target-arch
        # builds are not packaged for cross use, so build them from source with
        # the cross toolchain and drop them into the QEMU sysroot's lib dir (the
        # target ld.so searches <prefix>/lib). bzip2's soname is libbz2.so.1.0,
        # so add the libbz2.so.1 name vsearch dlopens.
        sysroot=${{ matrix.target.prefix }}
        cc=${{ matrix.target.host }}-gcc
        mkdir -p zlib bzip2
        curl -fsSL https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz | tar xz --strip-components=1 -C zlib
        curl -fsSL https://github.com/libarchive/bzip2/archive/refs/tags/bzip2-1.0.8.tar.gz | tar xz --strip-components=1 -C bzip2
        ( cd zlib && CC="$cc" CHOST=${{ matrix.target.host }} ./configure && make -j"$(nproc)" )
        sudo cp -a zlib/libz.so.1* "$sysroot/lib/"
        ( cd bzip2 && make -f Makefile-libbz2_so CC="$cc" -j"$(nproc)" )
        sudo cp -a bzip2/libbz2.so.1.0* "$sysroot/lib/"
        sudo ln -sf libbz2.so.1.0 "$sysroot/lib/libbz2.so.1"

    - name: Smoke-run under QEMU (${{ matrix.target.qemu }})
      run: |
        # qemu-user needs the target's shared libraries (ld.so, libc, libstdc++,
        # and now libz/libbz2); QEMU_LD_PREFIX points it at the cross sysroot.
        export QEMU_LD_PREFIX=${{ matrix.target.prefix }}
        q=${{ matrix.target.qemu }}
        echo "===== version (expect zlib AND bzip2 loaded) ====="
        $q bin/vsearch --version
        # 3 sequences (32 bp, >= default minseqlength), two identical -> expect 2
        # unique. Run it plain, gzip'd and bzip2'd: reading the compressed inputs
        # exercises the dlopen'd libz/libbz2 (would error if they were missing),
        # plus hashing/dedup/FASTA-I/O under emulation — not just startup.
        printf '>a\nACGTACGTACGTACGTACGTACGTACGTACGT\n>b\nACGTACGTACGTACGTACGTACGTACGTACGT\n>c\nTTTTGGGGTTTTGGGGTTTTGGGGTTTTGGGG\n' > smoke.fasta
        gzip  -c smoke.fasta > smoke.fasta.gz
        bzip2 -c smoke.fasta > smoke.fasta.bz2
        for f in smoke.fasta smoke.fasta.gz smoke.fasta.bz2; do
          echo "===== dereplicate ${f} ====="
          $q bin/vsearch --derep_fulllength "$f" --output out --quiet
          got=$(grep -c '^>' out || true)
          echo "  unique sequences: ${got} (expected 2)"
          test "${got}" -eq 2
        done
        echo "${{ matrix.target.name }} QEMU smoke (plain/gz/bz2) passed."


  # Actually RUN the Windows (mingw) cross-build under Wine, to catch
  # link/startup breakage the build-only cross-build job cannot. Built with
  # LDFLAGS=-static so the .exe is self-contained (no libstdc++/libgcc/winpthread
  # DLLs to stage). Non-gating while it proves out.
  wine-smoke-windows:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event_name != 'schedule' }}
    continue-on-error: true

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install mingw toolchain and Wine
      run: |
        sudo apt-get update
        sudo apt-get install -y ghostscript groff mingw-w64 libz-mingw-w64-dev wine

    - name: Cross-build for windows-x86_64 (static)
      run: |
        ./autogen.sh
        ./configure CFLAGS="-O2" CXXFLAGS="-O2" LDFLAGS="-static" --host=x86_64-w64-mingw32
        make clean
        make ARFLAGS="cr" -j$(nproc)

    - name: Provide Windows zlib/bzip2 DLLs for runtime gz/bz2
      run: |
        # vsearch dlopens zlib1.dll / libbz2.dll at runtime. Neither is packaged
        # for mingw on Ubuntu, so build both from source with the mingw toolchain
        # and place them next to the .exe (Wine searches the exe's directory).
        mkdir -p zlib bzip2
        curl -fsSL https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz | tar xz --strip-components=1 -C zlib
        curl -fsSL https://github.com/libarchive/bzip2/archive/refs/tags/bzip2-1.0.8.tar.gz | tar xz --strip-components=1 -C bzip2
        make -C zlib -f win32/Makefile.gcc PREFIX=x86_64-w64-mingw32- zlib1.dll
        cp zlib/zlib1.dll bin/
        # bzip2 has no mingw makefile; compile its sources and link a DLL by hand.
        ( cd bzip2 && x86_64-w64-mingw32-gcc -O2 -D_FILE_OFFSET_BITS=64 \
            -c blocksort.c huffman.c crctable.c randtable.c compress.c decompress.c bzlib.c && \
          x86_64-w64-mingw32-gcc -shared -o libbz2.dll *.o )
        cp bzip2/libbz2.dll bin/

    - name: Smoke-run under Wine
      run: |
        export WINEDEBUG=-all
        # mingw may name the binary with or without the .exe suffix.
        exe=bin/vsearch.exe; [ -f "$exe" ] || exe=bin/vsearch
        echo "===== version (expect zlib AND bzip2 loaded) ====="
        wine "$exe" --version
        # 3 sequences, two identical -> expect 2 unique. Run plain, gzip'd and
        # bzip2'd: reading the compressed inputs exercises the DLLs we staged
        # (would error if missing). grep '^>' is line-ending agnostic, so Windows
        # CRLF output still counts.
        printf '>a\nACGTACGTACGTACGTACGTACGTACGTACGT\n>b\nACGTACGTACGTACGTACGTACGTACGTACGT\n>c\nTTTTGGGGTTTTGGGGTTTTGGGGTTTTGGGG\n' > smoke.fasta
        gzip  -c smoke.fasta > smoke.fasta.gz
        bzip2 -c smoke.fasta > smoke.fasta.bz2
        for f in smoke.fasta smoke.fasta.gz smoke.fasta.bz2; do
          echo "===== dereplicate ${f} ====="
          wine "$exe" --derep_fulllength "$f" --output out --quiet
          got=$(grep -c '^>' out || true)
          echo "  unique sequences: ${got} (expected 2)"
          test "${got}" -eq 2
        done
        echo "windows-x86_64 Wine smoke (plain/gz/bz2) passed."


  macos-arm64:
    runs-on: macos-latest
    timeout-minutes: 20
    if: ${{ github.event_name != 'schedule' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        # aws/tap and azure/bicep are pre-tapped on the GitHub macOS runner
        # images and trigger Homebrew tap-trust warnings; we use nothing from
        # them, so remove them before updating/installing. azure/bicep ships an
        # installed formula (bicep): uninstall it first so the tap untaps
        # cleanly without --force (which would itself print a warning). Each
        # step is guarded so it stays quiet and non-fatal on a future image
        # that no longer has these taps/formulae. We do NOT silence stderr of
        # the actual operations: hiding it is what masked the earlier failure.
        brew list bicep >/dev/null 2>&1 && brew uninstall bicep
        for tap in aws/tap azure/bicep; do
          brew tap | grep -qx "$tap" && brew untap "$tap"
        done
        brew update
        brew install autoconf automake ghostscript groff

    - name: Configure and build
      run: |
        ./autogen.sh
        ./configure CFLAGS="-O2" CXXFLAGS="-O2"
        make clean
        make ARFLAGS="cr" -j$(sysctl -n hw.ncpu)
        bin/vsearch -v

    - name: Run tests
      run: |
        export PATH=$PWD/bin:$PATH
        git clone --depth 1 --branch ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }} https://github.com/frederic-mahe/vsearch-tests
        cd vsearch-tests
        bash ./run_all_tests.sh


  macos-x86_64:
    runs-on: macos-15-intel
    timeout-minutes: 20
    # macOS is billed at 10x, and macos-arm64 already covers the macOS
    # toolchain per push/PR while linux-x86_64 covers the x86 SIMD path. So run
    # the x86_64 macOS build only on the weekly schedule and on manual dispatch.
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        # aws/tap and azure/bicep are pre-tapped on the GitHub macOS runner
        # images and trigger Homebrew tap-trust warnings; we use nothing from
        # them, so remove them before updating/installing. azure/bicep ships an
        # installed formula (bicep): uninstall it first so the tap untaps
        # cleanly without --force (which would itself print a warning). Each
        # step is guarded so it stays quiet and non-fatal on a future image
        # that no longer has these taps/formulae. We do NOT silence stderr of
        # the actual operations: hiding it is what masked the earlier failure.
        brew list bicep >/dev/null 2>&1 && brew uninstall bicep
        for tap in aws/tap azure/bicep; do
          brew tap | grep -qx "$tap" && brew untap "$tap"
        done
        brew update
        brew install autoconf automake ghostscript groff

    - name: Configure and build
      run: |
        ./autogen.sh
        ./configure CFLAGS="-O2" CXXFLAGS="-O2"
        make clean
        make ARFLAGS="cr" -j$(sysctl -n hw.ncpu)
        bin/vsearch -v

    - name: Run tests
      run: |
        export PATH=$PWD/bin:$PATH
        git clone --depth 1 --branch ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }} https://github.com/frederic-mahe/vsearch-tests
        cd vsearch-tests
        bash ./run_all_tests.sh


  freebsd-x86_64:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event_name != 'schedule' }}
    # The FreeBSD VM (vmactions / nested QEMU) intermittently hangs during the
    # test run — roughly half the time the suite stalls after "Running tests..."
    # and the job is cancelled at the 20-minute limit. Until that is understood
    # and fixed, keep this job from gating PRs: it still runs and reports, but a
    # hang/failure here no longer fails the workflow. See the diagnostics added
    # to the run step below (per-suite timeout + heartbeat + uploaded log).
    continue-on-error: true

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    # Clone the test suite on the Ubuntu host, where the network is reliable,
    # rather than inside the FreeBSD VM. An in-VM `git clone` intermittently
    # stalls on the guest's network and, with no git timeout, hangs until the
    # 20-minute job limit. vmactions syncs the workspace into the VM, so the
    # cloned directory is available there.
    - name: Clone the test suite (on the host, not the FreeBSD VM)
      run: |
        git clone --depth 1 --branch ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }} https://github.com/frederic-mahe/vsearch-tests

    - name: Build and test on FreeBSD
      uses: vmactions/freebsd-vm@v1
      with:
        usesh: true
        prepare: |
          pkg update -f
          pkg install -y autoconf automake gmake bash git bzip2 ghostscript10 groff
          pw useradd -n runner -m -s /usr/local/bin/bash
        run: |
          echo "========== Building vsearch =========="
          ./autogen.sh
          ./configure CFLAGS="-O2" CXXFLAGS="-O2"
          gmake clean
          gmake ARFLAGS="cr" -j$(sysctl -n hw.ncpu)
          bin/vsearch -v
          echo "========== Build complete =========="

          # vsearch-tests was cloned on the host (previous step); vmactions
          # syncs the workspace into the VM, so it should be present here.
          # Fail fast with a clear message (not a hang) if the sync did not
          # bring it in.
          echo "========== Checking for the test suite in the VM =========="
          if [ ! -d vsearch-tests/scripts ]; then
            echo "ERROR: vsearch-tests was not synced into the VM. Workspace contents:"
            ls -la
            exit 1
          fi
          echo "Found vsearch-tests ($(ls vsearch-tests/scripts | wc -l) test scripts)."
          chown -R runner vsearch-tests

          # The suite runs ~7,700 tests, each printing a result line.
          # Streaming that volume over the vmactions SSH channel wedges
          # the FreeBSD guest after a few minutes (it stops responding at
          # a random point). Run the suite into a log file inside the VM
          # instead, then surface a bounded summary so CI still reports
          # failures. root bypasses POSIX permission checks, so the "file
          # not readable/writable" tests need an unprivileged user.
          #
          # The suite runs in the background under its own timeout (so a hung
          # test cannot eat the whole 20-minute job budget and skip the summary
          # below). A watcher polls the log once a second but prints only when
          # the last non-blank line changes — near-real-time progress without
          # flooding the vmactions SSH channel (high output volume wedges the
          # guest, which is why the suite output is redirected to a file in the
          # first place). After ~30 s with no new output it dumps the test
          # process tree with each process's state and wait channel (wchan).
          #
          # On FreeBSD the suite reaches its end but teardown stalls: <() is a
          # real named FIFO there, so a negative test that fed vsearch an input
          # via <() leaves the FIFO writer blocked in fifoow once vsearch
          # rejects the options *before opening* the input (no reader ever
          # appears). On Linux <() is a /dev/fd pipe, so this never happens. The
          # watcher reaps ONLY those fifoow-blocked writers — a targeted kill by
          # pid, never a broad `pkill -U runner`, which also kills the vmactions
          # SSH shell (ssh exits 143) and skips copyback — which lets the suite
          # process exit. Pass/fail is then decided purely by FAIL lines in
          # test.log; the teardown stall is not a failure. A stall with no
          # fifoow writers is treated as a genuine hang and fails.
          echo "========== Running tests... =========="
          suite_timeout=720
          rm -f vsearch-tests/test.log
          su -m runner -c "cd vsearch-tests && PATH=$PWD/bin:\$PATH timeout -k 30 ${suite_timeout} bash ./run_all_tests.sh > test.log 2>&1" </dev/null >/dev/null 2>&1 &
          suite_pid=$!
          last_sig=""
          stall=0
          reaped=0
          genuine_hang=0
          while kill -0 "$suite_pid" 2>/dev/null; do
            sig=$(tail -n 20 vsearch-tests/test.log 2>/dev/null | grep -v '^[[:space:]]*$' | tail -n 1)
            if [ "$sig" != "$last_sig" ]; then
              echo "[$(date -u +%H:%M:%S)] $sig"
              last_sig="$sig"
              stall=0
            else
              stall=$((stall + 1))
              if [ "$stall" -ge 30 ]; then
                echo "[$(date -u +%H:%M:%S)] no new test output for ${stall}s; test process tree (pid ppid stat wchan command):"
                ps -U runner -o pid,ppid,stat,wchan,command 2>/dev/null | head -n 30 | sed 's/^/    /'
                # Reap ONLY the fifoow-blocked <() writers (see the note above):
                # a targeted kill by pid, never a broad pkill. This lets the
                # suite process unwind and exit; pass/fail comes from FAIL lines.
                fifoow_pids=$(ps -U runner -o pid,wchan 2>/dev/null | awk '$2 == "fifoow" { print $1 }')
                if [ -n "$fifoow_pids" ]; then
                  echo "[$(date -u +%H:%M:%S)] reaping orphaned fifoow <() writers: $(echo $fifoow_pids | tr '\n' ' ')"
                  echo "$fifoow_pids" | xargs kill 2>/dev/null
                  reaped=1
                else
                  # Stalled but nothing is blocked in fifoow: not the known
                  # teardown artifact, so treat it as a genuine hang and fail.
                  echo "[$(date -u +%H:%M:%S)] stall with no fifoow writers — treating as a genuine hang."
                  genuine_hang=1
                fi
                break
              fi
            fi
            sleep 1
          done
          # Give the (reaped) suite a moment to unwind, but never block forever
          # on it: if it is still alive after the grace period, abandon it to the
          # VM teardown — the background job is detached from the SSH stdio so the
          # session still closes cleanly and vmactions runs copyback.
          for _ in $(seq 1 20); do kill -0 "$suite_pid" 2>/dev/null || break; sleep 1; done
          if kill -0 "$suite_pid" 2>/dev/null; then
            echo "suite process still alive after reap; abandoning it to VM teardown."
          else
            wait "$suite_pid" 2>/dev/null
          fi
          echo "========== Tests finished =========="
          # Pass/fail = did any test report FAIL. The teardown stall is not a
          # failure (all tests ran). A genuine hang (no fifoow writers) fails.
          echo "===== FAIL lines ====="
          if grep -E 'FAIL' vsearch-tests/test.log; then
            status=1
          else
            echo "(none)"
            status=0
          fi
          if [ "$genuine_hang" -eq 1 ]; then
            echo "!!! Genuine hang detected (stall with no fifoow writers)."
            status=124
          fi
          echo "===== last 60 lines of test.log ====="
          tail -n 60 vsearch-tests/test.log
          # Record the status and exit 0 so vmactions runs its copyback: it SKIPS
          # copyback when the run script exits non-zero, which is why the test.log
          # artifact kept coming up empty. The host-side "Report" step below reads
          # test.status and turns it back into the job's pass/fail.
          echo "$status" > vsearch-tests/test.status
          exit 0

    # vmactions copies the workspace back to the host, so the full in-VM test
    # log (all ~7,700 result lines, not just the tail above) is available here.
    # Upload it for offline inspection. Runs even when the suite fails.
    - name: Upload FreeBSD test log
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: freebsd-test-log
        path: vsearch-tests/test.log
        if-no-files-found: warn

    # The VM script exits 0 so vmactions copies test.log / test.status back to
    # the host; the real suite status is recorded in test.status. Re-assert it
    # here so the job's pass/fail reflects the actual result.
    - name: Report FreeBSD test result
      if: always()
      run: |
        status=$(cat vsearch-tests/test.status 2>/dev/null || echo 1)
        echo "FreeBSD test suite exit status: ${status}"
        exit "${status}"
