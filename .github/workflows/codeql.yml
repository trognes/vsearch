name: CodeQL

on:
  # Skip documentation-only changes; the weekly scan keeps the security view fresh.
  push:
    branches: [ "master", "dev" ]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [ "master", "dev" ]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (c-cpp)
    runs-on: ubuntu-latest

    # CodeQL uploads results to the repository's Security tab.
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ghostscript groff libbz2-dev zlib1g-dev

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: c-cpp
        # We drive the build ourselves (autogen/configure/make in the Build
        # step below) because the project requires `make ARFLAGS="cr"`, so use
        # the manual build mode to get a complete, accurate database from the
        # real compilation. Buildless `build-mode: none` would be faster (and is
        # the only mode CodeQL v4's overlay-database optimization supports) but
        # would miss the autotools-generated config.h and the conditionally
        # compiled SIMD variants, so we deliberately stay on manual.
        #
        # Expected, harmless: because this is not `build-mode: none`, the
        # analyze step logs "Cannot build an overlay database because build-mode
        # is set to 'manual' instead of 'none'. Falling back to creating a
        # normal full database instead." A full database is exactly what we want.
        build-mode: manual
        # security-extended adds the deeper security queries (taint tracking
        # from file/CLI input to array indices) that target the S1-S4 class of
        # bugs in CODE_REVIEW.md — exactly what sanitizers cannot reach without
        # a crafted triggering input.
        queries: security-extended

    # Manual build: the project requires `make ARFLAGS="cr"`, which autobuild
    # does not pass.
    - name: Build
      run: |
        ./autogen.sh
        ./configure CFLAGS="-O2" CXXFLAGS="-O2"
        make ARFLAGS="cr" -j"$(nproc)"

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:c-cpp"
