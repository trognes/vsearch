name: Sanitizers (ASan/UBSan)

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]
  workflow_dispatch:

jobs:
  asan-ubsan:

    runs-on: ubuntu-latest

    # Non-gating for now: this job inventories pre-existing sanitizer findings
    # without blocking merges. Flip to gating once the backlog is cleared.
    continue-on-error: true

    env:
      # -O1 + frame pointers gives readable stack traces. Sanitizers run in
      # "recover" mode (no -fno-sanitize-recover) so the whole suite runs and
      # every finding is captured rather than aborting at the first one.
      SAN_FLAGS: "-fsanitize=address,undefined -fno-omit-frame-pointer -g -O1"

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ghostscript groff libbz2-dev zlib1g-dev

    - name: Configure (AddressSanitizer + UndefinedBehaviorSanitizer)
      run: |
        ./autogen.sh
        ./configure \
          CFLAGS="$SAN_FLAGS" \
          CXXFLAGS="$SAN_FLAGS" \
          LDFLAGS="-fsanitize=address,undefined"

    - name: Build
      run: |
        JOBS=$(nproc 2>/dev/null || echo 1)
        make ARFLAGS="cr" -j$JOBS

    - name: Install tests
      run: |
        git clone https://github.com/frederic-mahe/vsearch-tests

    - name: Run tests under sanitizers (inventory mode, non-blocking)
      run: |
        export PATH=$PWD/bin:$PATH
        # Inventory mode: print and continue so the whole suite runs.
        # Leak detection is off (vsearch frees at process exit by design).
        export ASAN_OPTIONS="detect_leaks=0:halt_on_error=0:exitcode=0:print_stacktrace=1"
        export UBSAN_OPTIONS="print_stacktrace=1:halt_on_error=0"
        cd vsearch-tests
        bash ./run_all_tests.sh > "$GITHUB_WORKSPACE/sanitizer-run.log" 2>&1 || true
        echo "Test run finished (non-blocking)."

    - name: Upload sanitizer log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sanitizer-run-log
        path: sanitizer-run.log

    - name: Summarize sanitizer findings
      if: always()
      run: |
        set +e
        log=sanitizer-run.log
        {
          echo "## Sanitizer findings (inventory)"
          echo
          if [ ! -f "$log" ]; then
            echo "No log produced (an earlier step failed)."
          else
            echo "### UBSan — unique runtime errors (file:line:col)"
            echo '```'
            grep -hoE "[A-Za-z0-9_./]+:[0-9]+:[0-9]+: runtime error: .*" "$log" | sort -u
            echo '```'
            echo "### ASan — unique error types"
            echo '```'
            grep -hE "ERROR: AddressSanitizer" "$log" | sort -u
            echo '```'
          fi
        } | tee -a "$GITHUB_STEP_SUMMARY"
