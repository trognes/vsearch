name: Sanitizers (ASan/UBSan)

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]
  workflow_dispatch:

jobs:
  asan-ubsan:

    runs-on: ubuntu-latest

    env:
      # -O1 + frame pointers gives readable stack traces; -fno-sanitize-recover
      # makes UBSan abort (non-zero exit) on the first violation instead of
      # printing and continuing, so failures surface clearly.
      SAN_FLAGS: "-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all -g -O1"

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ghostscript groff libbz2-dev zlib1g-dev

    - name: Configure (AddressSanitizer + UndefinedBehaviorSanitizer)
      run: |
        ./autogen.sh
        ./configure \
          CFLAGS="$SAN_FLAGS" \
          CXXFLAGS="$SAN_FLAGS" \
          LDFLAGS="-fsanitize=address,undefined"

    - name: Build
      run: |
        JOBS=$(nproc 2>/dev/null || echo 1)
        make ARFLAGS="cr" -j$JOBS

    - name: Install tests
      run: |
        git clone https://github.com/frederic-mahe/vsearch-tests

    - name: Run tests under sanitizers
      run: |
        set -o pipefail
        export PATH=$PWD/bin:$PATH
        # Leak detection is disabled: vsearch relies on process exit to reclaim
        # memory, so LeakSanitizer would report many benign "leaks" and drown
        # out real corruption/UB findings. Leaks can be chased in a separate run.
        export ASAN_OPTIONS="detect_leaks=0:abort_on_error=1:print_stacktrace=1"
        export UBSAN_OPTIONS="print_stacktrace=1"
        cd vsearch-tests
        bash ./run_all_tests.sh 2>&1 | tee "$GITHUB_WORKSPACE/sanitizer-run.log"

    - name: Fail on sanitizer reports
      if: always()
      run: |
        if [ ! -f sanitizer-run.log ]; then
          echo "No test log produced (earlier step failed); see logs above."
          exit 1
        fi
        if grep -E "ERROR: AddressSanitizer|runtime error:|SUMMARY: (Address|Undefined)Sanitizer" sanitizer-run.log; then
          echo "::error::Sanitizer reported one or more errors (see matches above)."
          exit 1
        fi
        echo "No sanitizer errors detected in the test run."
